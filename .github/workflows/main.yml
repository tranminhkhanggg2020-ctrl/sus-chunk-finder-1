name: Build Minecraft Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Tải mã nguồn về máy chủ GitHub
      uses: actions/checkout@v4

    - name: Cài đặt Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Sửa tên file và cấp quyền thực thi cho Gradle
      run: |
        if [ -f gradlew.txt ]; then mv gradlew.txt gradlew; fi
        chmod +x ./gradlew
      working-directory: ./sus-chunk-finder-main/sus-chunk-finder-main/SusChunkFinder/SusChunkFinder

    - name: Chạy lệnh Build Mod
      run: ./gradlew build
      working-directory: ./sus-chunk-finder-main/sus-chunk-finder-main/SusChunkFinder/SusChunkFinder

    - name: Lưu và tải file .jar thành phẩm
      uses: actions/upload-artifact@v4
      with:
        name: Mod-Thanh-Pham
        path: ./sus-chunk-finder-main/sus-chunk-finder-main/SusChunkFinder/SusChunkFinder/build/libs/*.jar
