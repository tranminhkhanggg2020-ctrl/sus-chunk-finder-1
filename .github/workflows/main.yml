name: Build Minecraft Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Tải mã nguồn về máy chủ GitHub
      uses: actions/checkout@v4

    - name: Cài đặt Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cấp quyền thực thi cho Gradle
      run: chmod +x ./gradlew
      # Đã bỏ /SusChunkFinder ở cuối
      working-directory: ./sus-chunk-finder-main 

    - name: Chạy lệnh Build Mod
      run: ./gradlew build
      # Đã bỏ /SusChunkFinder ở cuối
      working-directory: ./sus-chunk-finder-main 

    - name: Lưu và tải file .jar thành phẩm
      uses: actions/upload-artifact@v4
      with:
        name: Mod-Thanh-Pham
        # Đã sửa lại đường dẫn tìm file .jar
        path: ./sus-chunk-finder-main/build/libs/*.jar
